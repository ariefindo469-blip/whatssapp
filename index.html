    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #e4e9f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .chat-container {
            width: 100%;
            max-width: 550px;
            height: 90vh;
            max-height: 800px;
            background: #efeae2;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #f0f2f5;
            padding: 12px 18px;
            border-bottom: 1px solid #e9edef;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #075e54;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover { background: #e0e4e9; }
        .group-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(145deg, #128C7E, #075e54);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 700; font-size: 1rem; color: #111b21; }
        .chat-status { font-size: 0.7rem; color: #667781; }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 10% 30%, rgba(200,200,200,0.05) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            cursor: pointer;
        }
        .message-wrapper:active { opacity: 0.7; }
        .incoming { align-self: flex-start; }
        .outgoing { align-self: flex-end; }
        .sender-name {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 4px;
            padding-left: 8px;
            color: #1f7b4d;
        }
        .outgoing .sender-name {
            text-align: right;
            padding-right: 8px;
            color: #075e54;
        }
        .bubble-content {
            background-color: white;
            border-radius: 18px 18px 18px 4px;
            padding: 10px 14px;
            font-size: 0.9rem;
            line-height: 1.4;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
            word-wrap: break-word;
        }
        .outgoing .bubble-content {
            background-color: #d9fdd3;
            border-radius: 18px 18px 4px 18px;
        }
        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            font-size: 0.65rem;
            color: #8696a0;
            margin-top: 4px;
            padding-right: 6px;
        }
        .incoming .message-meta { justify-content: flex-start; padding-left: 8px; }
        .video-message, .image-message { padding: 0; overflow: hidden; border-radius: 16px; background: #1f2c34; max-width: 260px; }
        .video-thumb, .image-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            cursor: pointer;
        }
        .image-thumb {
            aspect-ratio: 1 / 1;
            background-size: cover;
        }
        .play-overlay-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .image-thumb:hover .image-overlay { opacity: 1; }
        .image-overlay i { font-size: 2rem; color: white; text-shadow: 0 1px 5px black; }
        .play-overlay-video i { font-size: 2.5rem; color: white; text-shadow: 0 2px 5px black; }
        .video-duration {
            position: absolute;
            bottom: 6px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: white;
        }
        .video-caption, .image-caption { padding: 8px 12px 10px; font-size: 0.8rem; color: #e9edef; background: #1f2c34; border-top: 1px solid #2a3942; }
        .voice-message { min-width: 210px; }
        .voice-player { display: flex; align-items: center; gap: 12px; }
        .play-voice-btn {
            background: #075e54;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: white;
        }
        .voice-wave { flex: 1; display: flex; align-items: center; gap: 3px; }
        .wave-bar { width: 3px; background-color: #667781; border-radius: 2px; transition: 0.1s; }
        .voice-duration { font-size: 0.7rem; font-family: monospace; min-width: 40px; color: #667781; }
        .text-message { word-break: break-word; }
        .input-area {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #e9edef;
        }
        .input-field {
            flex: 1;
            background: white;
            border: none;
            border-radius: 30px;
            padding: 10px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        .send-btn {
            background: #075e54;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: #e9edef; }
        .messages-area::-webkit-scrollbar-thumb { background: #b9c4ce; border-radius: 10px; }
        @media (max-width: 550px) {
            body { padding: 0; }
            .chat-container { height: 100vh; border-radius: 0; }
            .message-wrapper { max-width: 90%; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
        <div class="group-avatar">G</div>
        <div class="chat-info">
            <div class="chat-name">Keluarga Ceria 👨‍👩‍👧‍👦</div>
            <div class="chat-status">Andini, Budi, Citra, Dito • 138 anggota</div>
        </div>
        <i class="fas fa-ellipsis-v" style="color:#54656f; cursor:pointer;"></i>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
        <i class="far fa-smile-wink" style="color:#54656f; font-size:1.3rem;"></i>
        <input type="text" class="input-field" id="messageInput" placeholder="Ketik pesan grup...">
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // Data anggota grup
    const members = {
        andini: { name: "Andini", color: "#25D366", initial: "A", isMe: false },
        budi: { name: "Budi", color: "#128C7E", initial: "B", isMe: false },
        citra: { name: "Citra", color: "#34B7F1", initial: "C", isMe: false },
        dito: { name: "Dito", color: "#FF9A3C", initial: "D", isMe: false },
        saya: { name: "Saya", color: "#075e54", initial: "S", isMe: true }
    };

    // Semua gambar dan video thumbnail diganti dengan foto orang dewasa wajar (bukan anak-anak, bukan konten seksual)
    // Menggunakan picsum ID yang menampilkan orang dewasa: 64,83,91,100,102,106,108,112,115,116,117,118,119,120,121,122,123,124,125,126
    const messages = [
        {
            id: 1,
            type: "text",
            senderId: "andini",
            text: "nanti malam lanjut ya kak puas banget deh 📸",
            time: "09:24",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 2,
            type: "image",
            senderId: "budi",
            thumbnail: "https://picsum.photos/id/64/400/400",   // Pria dewasa tersenyum
            caption: "😎 Potret diriku pas lagi kerja, semangat!",
            time: "09:27",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 3,
            type: "image",
            senderId: "citra",
            thumbnail: "https://picsum.photos/id/83/400/400",   // Wanita dewasa dengan bunga
            caption: "🌼 Foto bersama teman-teman kantor",
            time: "09:30",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 4,
            type: "video",
            senderId: "dito",
            thumbnail: "https://picsum.photos/id/91/400/225",   // Pria dewasa di studio
            duration: "0:48",
            caption: "🎥 Video momen gathering karyawan",
            time: "09:34",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 5,
            type: "voice",
            senderId: "andini",
            duration: "0:32",
            textNote: "🎙️ lanjut nanti yaa",
            time: "09:37",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 6,
            type: "image",
            senderId: "saya",
            thumbnail: "https://picsum.photos/id/100/400/400",   // Wanita dewasa kamera
            caption: "📸 bagus banget vdeo videonya,puas dehh",
            time: "09:41",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 7,
            type: "text",
            senderId: "budi",
            text: "Wah mantap! Ini juga ada keren keren dari yang lain",
            time: "09:44",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 8,
            type: "image",
            senderId: "budi",
            thumbnail: "https://picsum.photos/id/102/400/400",   // Pria dewasa di alam
            caption: "🏞️ Foto liburan bareng teman-teman",
            time: "09:45",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 9,
            type: "image",
            senderId: "citra",
            thumbnail: "https://picsum.photos/id/106/400/400",   // Wanita dewasa dengan topi
            caption: "🌸 privasi ku abang",
            time: "09:48",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 10,
            type: "video",
            senderId: "saya",
            thumbnail: "https://picsum.photos/id/108/400/225",   // Pria dewasa berlari
            duration: "1:15",
            caption: "🎬 Video olahraga pagi, tetap bugar!",
            time: "09:52",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 11,
            type: "voice",
            senderId: "dito",
            duration: "0:28",
            textNote: "🗣️ nanti lanjutin ya kak, cek link penting ya",
            time: "09:55",
            status: "read",
            link: "https://omg10.com/4/10987615"
        },
        {
            id: 12,
            type: "text",
            senderId: "andini",
            text: "Jangan lupa klik semua gambar dan video di atas untuk dapatkan video lainnya! 🎁",
            time: "09:58",
            status: "read",
            link: "https://omg10.com/4/10987615"
        }
    ];

    function openLink(url) {
        if (url) {
            window.open(url, "_blank");
        } else {
            alert("Link tidak tersedia. Hubungi admin grup.");
        }
    }

    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        container.innerHTML = '';

        messages.forEach(msg => {
            const sender = members[msg.senderId] || members.andini;
            const isOutgoing = (msg.senderId === 'saya');
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = `message-wrapper ${isOutgoing ? 'outgoing' : 'incoming'}`;
            if (msg.link) wrapperDiv.dataset.link = msg.link;

            let contentHtml = `<div class="sender-name">${sender.name}</div>`;

            if (msg.type === 'text') {
                contentHtml += `<div class="bubble-content text-message">${escapeHtml(msg.text)}</div>`;
                wrapperDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (msg.link) openLink(msg.link);
                });
            }
            else if (msg.type === 'image') {
                const thumbUrl = msg.thumbnail || 'https://picsum.photos/id/64/400/400';
                const imageCaption = msg.caption ? escapeHtml(msg.caption) : '';
                contentHtml += `
                    <div class="bubble-content image-message" style="padding:0;">
                        <div class="image-thumb" style="background-image: url('${thumbUrl}'); background-size: cover;" data-link="${msg.link || ''}">
                            <div class="image-overlay">
                                <i class="fas fa-search-plus"></i>
                            </div>
                        </div>
                        ${imageCaption ? `<div class="image-caption">${imageCaption}</div>` : ''}
                    </div>
                `;
            }
            else if (msg.type === 'video') {
                const thumbUrl = msg.thumbnail || 'https://picsum.photos/id/91/400/225';
                const videoCaption = msg.caption ? escapeHtml(msg.caption) : '';
                contentHtml += `
                    <div class="bubble-content video-message" style="padding:0;">
                        <div class="video-thumb" style="background-image: url('${thumbUrl}'); background-size: cover;" data-link="${msg.link || ''}">
                            <div class="play-overlay-video">
                                <i class="fas fa-play-circle"></i>
                            </div>
                            <div class="video-duration">${msg.duration}</div>
                        </div>
                        ${videoCaption ? `<div class="video-caption">${videoCaption}</div>` : ''}
                    </div>
                `;
            }
            else if (msg.type === 'voice') {
                const voiceDuration = msg.duration;
                const noteText = msg.textNote ? escapeHtml(msg.textNote) : '';
                contentHtml += `
                    <div class="bubble-content voice-message">
                        <div class="voice-player" data-voice-duration="${voiceDuration}" data-link="${msg.link || ''}">
                            <button class="play-voice-btn" data-playing="false">
                                <i class="fas fa-play"></i>
                            </button>
                            <div class="voice-wave" id="wave-${msg.id}">
                                ${generateWaveBars()}
                            </div>
                            <span class="voice-duration">${voiceDuration}</span>
                        </div>
                        ${noteText ? `<div style="font-size:0.75rem; margin-top:6px; color:#667781;">${noteText}</div>` : ''}
                    </div>
                `;
            }

            contentHtml += `
                <div class="message-meta">
                    <span>${msg.time}</span>
                    ${isOutgoing ? '<i class="fas fa-check-double" style="color:#25d366;"></i>' : ''}
                </div>
            `;
            wrapperDiv.innerHTML = contentHtml;
            container.appendChild(wrapperDiv);
        });

        document.querySelectorAll('.image-thumb').forEach(thumb => {
            thumb.addEventListener('click', (e) => {
                e.stopPropagation();
                const link = thumb.getAttribute('data-link');
                if (link) openLink(link);
                else alert("Gambar ini tidak memiliki link.");
            });
        });

        document.querySelectorAll('.video-thumb').forEach(thumb => {
            thumb.addEventListener('click', (e) => {
                e.stopPropagation();
                const link = thumb.getAttribute('data-link');
                if (link) openLink(link);
                else alert("Video ini tidak memiliki link.");
            });
        });

        document.querySelectorAll('.voice-player').forEach(player => {
            const playBtn = player.querySelector('.play-voice-btn');
            const link = player.getAttribute('data-link');
            attachVoiceSimulation(player);
            player.addEventListener('click', (e) => {
                if (e.target === playBtn || playBtn.contains(e.target)) {
                    e.stopPropagation();
                    return;
                }
                if (link) openLink(link);
                else alert("Voice note tidak memiliki link.");
            });
        });

        scrollToBottom();
    }

    function attachVoiceSimulation(player) {
        const playBtn = player.querySelector('.play-voice-btn');
        const waveContainer = player.querySelector('.voice-wave');
        const durationSpan = player.querySelector('.voice-duration');
        let interval = null;
        let isPlaying = false;
        let currentSec = 0;
        const totalDurationSec = parseFloat(player.dataset.voiceDuration) || 32;

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) {
                clearInterval(interval);
                isPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                resetWaveBars(waveContainer);
            } else {
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                currentSec = 0;
                animateWave(waveContainer);
                interval = setInterval(() => {
                    if (currentSec >= totalDurationSec) {
                        clearInterval(interval);
                        isPlaying = false;
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        durationSpan.innerText = formatDuration(totalDurationSec);
                        resetWaveBars(waveContainer);
                        currentSec = 0;
                    } else {
                        currentSec++;
                        const remain = totalDurationSec - currentSec;
                        durationSpan.innerText = formatDuration(remain);
                    }
                }, 1000);
            }
        });
    }

    function generateWaveBars() {
        let bars = '';
        for (let i = 0; i < 18; i++) {
            const height = 6 + Math.random() * 14;
            bars += `<div class="wave-bar" style="height: ${height}px;"></div>`;
        }
        return bars;
    }

    function resetWaveBars(waveContainer) {
        const bars = waveContainer.querySelectorAll('.wave-bar');
        bars.forEach(bar => bar.style.height = '12px');
    }

    function animateWave(waveContainer) {
        const bars = waveContainer.querySelectorAll('.wave-bar');
        const interval = setInterval(() => {
            if (!waveContainer.parentElement?.querySelector('.play-voice-btn i.fa-pause')) {
                clearInterval(interval);
                return;
            }
            bars.forEach(bar => {
                const newH = 8 + Math.random() * 14;
                bar.style.height = `${newH}px`;
            });
        }, 200);
        waveContainer.intervalAnim = interval;
    }

    function formatDuration(sec) {
        if (isNaN(sec)) return "0:00";
        const mins = Math.floor(sec / 60);
        const remainSec = Math.floor(sec % 60);
        return `${mins}:${remainSec < 10 ? '0' + remainSec : remainSec}`;
    }

    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        if (area) area.scrollTop = area.scrollHeight;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function addNewTextMessage(text) {
        if (!text.trim()) return;
        const newMsg = {
            id: Date.now(),
            type: "text",
            senderId: "saya",
            text: text,
            time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
            status: "read",
            link: "https://omg10.com/4/10987615"
        };
        messages.push(newMsg);
        renderMessages();

        setTimeout(() => {
            const randomMember = ["andini", "budi", "citra", "dito"][Math.floor(Math.random() * 4)];
            const autoReply = {
                id: Date.now() + 1,
                type: "text",
                senderId: randomMember,
                text: "👍 Mantap! tunggu iklan sebentar ya kakk",
                time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
                status: "read",
                link: "https://omg10.com/4/10987615"
            };
            messages.push(autoReply);
            renderMessages();
        }, 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderMessages();
        const sendBtn = document.getElementById('sendBtn');
        const inputMsg = document.getElementById('messageInput');
        if (sendBtn && inputMsg) {
            sendBtn.addEventListener('click', () => {
                addNewTextMessage(inputMsg.value);
                inputMsg.value = '';
            });
            inputMsg.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addNewTextMessage(inputMsg.value);
                    inputMsg.value = '';
                }
            });
        }
        document.getElementById('backBtn')?.addEventListener('click', () => {
            alert("Tombol kembali (simulasi)");
        });
    });
</script>
</body>
</html>
